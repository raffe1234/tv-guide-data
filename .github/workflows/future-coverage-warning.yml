name: All channels must have at least 24 hours of future coverage

run-name: All channels must have at least 24 hours of future coverage

on:
  workflow_dispatch:
    inputs:
      warning_message:
        description: Future coverage warning details
        required: true
        type: string
      source_run_url:
        description: URL of the guide publication workflow run
        required: true
        type: string

permissions: {}

jobs:
  future-coverage-warning:
    name: All channels must have at least 24 hours of future coverage
    runs-on: ubuntu-latest
    steps:
      - name: Report insufficient future coverage
        env:
          SOURCE_RUN_URL: ${{ inputs.source_run_url }}
          WARNING_MESSAGE: ${{ inputs.warning_message }}
        run: |
          echo "::error title=Insufficient future TV guide coverage::$WARNING_MESSAGE"
          {
            echo "## Future coverage requirement failed"
            echo
            echo "$WARNING_MESSAGE"
            echo
            echo "The guide was published before this warning workflow was started."
            echo
            echo "[Open the publication workflow run]($SOURCE_RUN_URL)"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
