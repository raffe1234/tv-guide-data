name: Update TV guides

on:
  schedule:
    - cron: "17 2,14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-tv-guides
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Run quality checks
        run: |
          ruff check .
          ruff format --check .
          mypy
          pytest
      - name: Build and validate all guides
        id: build
        run: |
          warning_file="$RUNNER_TEMP/tv-guide-warnings.txt"
          python scripts/build.py --warning-file "$warning_file"
          if [[ -s "$warning_file" ]]; then
            echo "has_warnings=true" >> "$GITHUB_OUTPUT"
            while IFS= read -r warning; do
              echo "::warning title=TV guide coverage::$warning"
            done < "$warning_file"
            {
              echo "## TV guide coverage warnings"
              echo
              sed 's/^/- /' "$warning_file"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "has_warnings=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit changed guide files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/*.xml output/*.xml.gz
          if git diff --cached --quiet; then
            echo "No guide changes"
          else
            git commit -m "Update TV guide data"
            git pull --rebase origin main
            git push origin main
          fi
      - name: Report published coverage warnings
        if: steps.build.outputs.has_warnings == 'true'
        run: |
          echo "::error title=TV guide published with coverage warnings::The guide files were written and the publication step completed, but one or more coverage warnings require attention."
          exit 1
