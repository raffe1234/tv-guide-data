name: Update TV guides

on:
  schedule:
    # GitHub Actions schedules use UTC.
    - cron: "17 2,14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-tv-guides
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Run quality checks
        run: |
          ruff check .
          ruff format --check .
          pytest

      - name: Build and validate all guides
        run: python scripts/build.py

      - name: Commit changed guide files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/*.xml output/*.xml.gz
          if git diff --cached --quiet; then
            echo "No guide changes"
          else
            git commit -m "Update TV guide data"
            git push
          fi
