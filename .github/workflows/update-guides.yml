name: Update TV guides

on:
  schedule:
    - cron: "17 2,14 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: update-tv-guides
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Run quality checks
        run: |
          ruff check .
          ruff format --check .
          mypy
          pytest
      - name: Build and validate all guides
        id: build
        run: |
          warning_file="$RUNNER_TEMP/tv-guide-warnings.txt"
          future_coverage_file="$RUNNER_TEMP/tv-guide-future-coverage-warnings.txt"
          schedule_gap_file="$RUNNER_TEMP/tv-guide-schedule-gap-warnings.txt"

          python scripts/build.py --warning-file "$warning_file"

          grep -F "hours of future coverage; warning threshold is" "$warning_file" \
            > "$future_coverage_file" || true
          grep -F "future schedule gap of" "$warning_file" \
            > "$schedule_gap_file" || true

          if [[ -s "$future_coverage_file" ]]; then
            echo "has_future_coverage_warnings=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_future_coverage_warnings=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -s "$schedule_gap_file" ]]; then
            echo "has_schedule_gap_warnings=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_schedule_gap_warnings=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -s "$warning_file" ]]; then
            while IFS= read -r warning; do
              echo "::warning title=TV guide coverage::$warning"
            done < "$warning_file"
            {
              echo "## TV guide coverage warnings"
              echo
              sed 's/^/- /' "$warning_file"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Commit changed guide files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/*.xml output/*.xml.gz
          if git diff --cached --quiet; then
            echo "No guide changes"
          else
            git commit -m "Update TV guide data"
            git pull --rebase origin main
            git push origin main
          fi
      - name: Trigger future coverage warning workflow
        if: steps.build.outputs.has_future_coverage_warnings == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WARNING_FILE: ${{ runner.temp }}/tv-guide-future-coverage-warnings.txt
        run: |
          python - <<'PY' > "$RUNNER_TEMP/future-coverage-dispatch.json"
          import json
          import os
          from pathlib import Path

          payload = {
              "ref": os.environ["GITHUB_REF_NAME"],
              "inputs": {
                  "warning_message": Path(os.environ["WARNING_FILE"])
                  .read_text(encoding="utf-8")
                  .strip(),
                  "source_run_url": os.environ["SOURCE_RUN_URL"],
              },
          }
          print(json.dumps(payload))
          PY

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/$GITHUB_REPOSITORY/actions/workflows/future-coverage-warning.yml/dispatches" \
            --input "$RUNNER_TEMP/future-coverage-dispatch.json"
      - name: Trigger schedule gap warning workflow
        if: steps.build.outputs.has_schedule_gap_warnings == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WARNING_FILE: ${{ runner.temp }}/tv-guide-schedule-gap-warnings.txt
        run: |
          python - <<'PY' > "$RUNNER_TEMP/schedule-gap-dispatch.json"
          import json
          import os
          from pathlib import Path

          payload = {
              "ref": os.environ["GITHUB_REF_NAME"],
              "inputs": {
                  "warning_message": Path(os.environ["WARNING_FILE"])
                  .read_text(encoding="utf-8")
                  .strip(),
                  "source_run_url": os.environ["SOURCE_RUN_URL"],
              },
          }
          print(json.dumps(payload))
          PY

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/$GITHUB_REPOSITORY/actions/workflows/schedule-gap-warning.yml/dispatches" \
            --input "$RUNNER_TEMP/schedule-gap-dispatch.json"
